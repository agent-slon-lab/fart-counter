<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#d9f99d"/>
      <stop offset="55%" stop-color="#84cc16"/>
      <stop offset="100%" stop-color="#3f6212"/>
    </radialGradient>
    <radialGradient id="cloud" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ecfccb" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1a2e05" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Decorative swirl lines around -->
  <g opacity="0.25" stroke="#1a2e05" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M 70 140 Q 90 120 110 140 Q 130 160 110 180"/>
    <path d="M 420 320 Q 440 300 460 320 Q 480 340 460 360"/>
    <path d="M 80 380 Q 100 360 120 380"/>
    <circle cx="430" cy="140" r="4"/>
    <circle cx="60" cy="280" r="4"/>
    <circle cx="440" cy="430" r="4"/>
  </g>

  <!-- Main cloud body (cute fart cloud with face) -->
  <g filter="url(#shadow)">
    <!-- Cloud puff shape -->
    <path d="M 156 320
             Q 110 320 110 280
             Q 90 270 100 240
             Q 80 220 110 200
             Q 110 160 160 165
             Q 180 130 230 145
             Q 260 110 300 140
             Q 350 130 360 175
             Q 410 180 405 225
             Q 425 250 405 275
             Q 410 320 360 320
             Q 360 350 320 345
             Q 280 360 240 345
             Q 200 355 156 320 Z"
          fill="url(#cloud)" stroke="#65a30d" stroke-width="4"/>
  </g>

  <!-- Cheeks (rosy) -->
  <ellipse cx="190" cy="265" rx="22" ry="14" fill="url(#cheek)"/>
  <ellipse cx="320" cy="265" rx="22" ry="14" fill="url(#cheek)"/>

  <!-- Eyes (big cute) -->
  <g>
    <ellipse cx="215" cy="230" rx="18" ry="22" fill="#1a2e05"/>
    <ellipse cx="295" cy="230" rx="18" ry="22" fill="#1a2e05"/>
    <!-- Eye shine -->
    <circle cx="222" cy="222" r="6" fill="#ffffff"/>
    <circle cx="302" cy="222" r="6" fill="#ffffff"/>
    <circle cx="210" cy="236" r="3" fill="#ffffff"/>
    <circle cx="290" cy="236" r="3" fill="#ffffff"/>
  </g>

  <!-- Eyebrows (mischievous) -->
  <g stroke="#1a2e05" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M 195 200 Q 215 192 235 200"/>
    <path d="M 275 200 Q 295 192 315 200"/>
  </g>

  <!-- Mouth (tongue out - cheeky) -->
  <g>
    <path d="M 240 275 Q 255 295 272 275" stroke="#1a2e05" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Tongue -->
    <path d="M 250 285 Q 256 305 262 285 Z" fill="#fb7185" stroke="#1a2e05" stroke-width="2"/>
  </g>

  <!-- Motion lines (gas escaping) -->
  <g stroke="#1a2e05" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M 100 380 L 130 390"/>
    <path d="M 80 410 L 110 420"/>
    <path d="M 410 380 L 380 390"/>
    <path d="M 430 410 L 400 420"/>
  </g>

  <!-- Small gas puffs around -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="80" cy="200" r="10"/>
    <circle cx="70" cy="220" r="6"/>
    <circle cx="440" cy="200" r="10"/>
    <circle cx="450" cy="220" r="6"/>
    <circle cx="100" cy="450" r="8"/>
    <circle cx="420" cy="450" r="8"/>
  </g>
</svg>
