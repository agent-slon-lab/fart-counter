<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9f99d"/>
      <stop offset="50%" stop-color="#84cc16"/>
      <stop offset="100%" stop-color="#3f6212"/>
    </linearGradient>
    <radialGradient id="cloud" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ecfccb" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative swirl lines -->
  <g opacity="0.2" stroke="#1a2e05" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M 100 100 Q 140 60 180 100 Q 220 140 180 180"/>
    <path d="M 1080 500 Q 1120 460 1160 500 Q 1200 540 1160 580"/>
    <circle cx="1100" cy="120" r="8"/>
    <circle cx="80" cy="500" r="8"/>
    <circle cx="600" cy="80" r="6"/>
    <circle cx="580" cy="560" r="6"/>
  </g>

  <!-- Small gas puffs around -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="120" cy="250" r="25"/>
    <circle cx="100" cy="290" r="15"/>
    <circle cx="1080" cy="180" r="25"/>
    <circle cx="1100" cy="220" r="15"/>
    <circle cx="180" cy="540" r="20"/>
    <circle cx="1020" cy="540" r="20"/>
  </g>

  <!-- Left side: big icon (cute cloud face) -->
  <g transform="translate(220, 315)">
    <!-- Cloud body -->
    <path d="M -90 60
             Q -140 60 -140 20
             Q -160 10 -150 -20
             Q -170 -40 -140 -60
             Q -140 -100 -90 -95
             Q -70 -130 -20 -115
             Q 10 -140 50 -110
             Q 100 -120 110 -75
             Q 160 -70 155 -25
             Q 175 0 155 25
             Q 160 70 110 70
             Q 110 100 70 95
             Q 30 110 -10 95
             Q -50 105 -90 60 Z"
          fill="url(#cloud)" stroke="#65a30d" stroke-width="6"/>

    <!-- Cheeks -->
    <ellipse cx="-60" cy="5" rx="35" ry="22" fill="url(#cheek)"/>
    <ellipse cx="60" cy="5" rx="35" ry="22" fill="url(#cheek)"/>

    <!-- Eyes -->
    <ellipse cx="-35" cy="-30" rx="22" ry="28" fill="#1a2e05"/>
    <ellipse cx="35" cy="-30" rx="22" ry="28" fill="#1a2e05"/>
    <circle cx="-27" cy="-40" r="8" fill="#ffffff"/>
    <circle cx="43" cy="-40" r="8" fill="#ffffff"/>
    <circle cx="-40" cy="-22" r="4" fill="#ffffff"/>
    <circle cx="30" cy="-22" r="4" fill="#ffffff"/>

    <!-- Eyebrows -->
    <g stroke="#1a2e05" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M -55 -65 Q -35 -75 -15 -65"/>
      <path d="M 15 -65 Q 35 -75 55 -65"/>
    </g>

    <!-- Mouth (cheeky tongue) -->
    <path d="M -15 25 Q 0 50 18 25" stroke="#1a2e05" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M -5 40 Q 0 65 8 40 Z" fill="#fb7185" stroke="#1a2e05" stroke-width="3"/>

    <!-- Motion lines -->
    <g stroke="#1a2e05" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6">
      <path d="M -180 110 L -140 125"/>
      <path d="M -190 140 L -150 155"/>
      <path d="M 140 110 L 180 125"/>
      <path d="M 150 140 L 190 155"/>
    </g>
  </g>

  <!-- Right side: text -->
  <g transform="translate(620, 180)">
    <!-- App name -->
    <text x="0" y="0" fill="#1a2e05" font-family="Arial, sans-serif" font-size="72" font-weight="900">Fart Counter</text>
    <text x="0" y="60" fill="#1a2e05" font-family="Arial, sans-serif" font-size="36" font-weight="600" opacity="0.8">Счётчик Пуков</text>

    <!-- Tagline -->
    <text x="0" y="140" fill="#1a2e05" font-family="Arial, sans-serif" font-size="28" opacity="0.85">Free offline PWA</text>
    <text x="0" y="180" fill="#1a2e05" font-family="Arial, sans-serif" font-size="28" opacity="0.85">Track your windiness 💨</text>

    <!-- Feature badges -->
    <g transform="translate(0, 230)">
      <rect x="0" y="0" width="200" height="50" rx="25" fill="#1a2e05"/>
      <text x="100" y="32" fill="#d9f99d" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">✓ No ads</text>

      <rect x="220" y="0" width="240" height="50" rx="25" fill="#1a2e05"/>
      <text x="340" y="32" fill="#d9f99d" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">✓ No tracking</text>
    </g>
    <g transform="translate(0, 295)">
      <rect x="0" y="0" width="220" height="50" rx="25" fill="#1a2e05"/>
      <text x="110" y="32" fill="#d9f99d" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">✓ Works offline</text>

      <rect x="240" y="0" width="200" height="50" rx="25" fill="#1a2e05"/>
      <text x="340" y="32" fill="#d9f99d" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">✓ &lt; 1 MB</text>
    </g>

    <!-- 7 languages -->
    <text x="0" y="395" fill="#1a2e05" font-family="Arial, sans-serif" font-size="24" font-weight="600" opacity="0.8">🌍 7 languages: RU EN ES PT DE FR HI</text>
  </g>

  <!-- Bottom URL bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#1a2e05"/>
  <text x="600" y="618" fill="#d9f99d" font-family="Arial, sans-serif" font-size="18" font-weight="600" text-anchor="middle" opacity="0.9">fart-counter.vercel.app</text>
</svg>
